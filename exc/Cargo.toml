[package]
authors = ["rise0chen"]
description = "exc"
edition = "2021"
keywords = ["exchange"]
license = "MIT"
name = "exc"
readme = "./README.md"
repository = ""
version = "0.7.0"

[features]
default = ["rustls-tls"]
native-tls = ["exc-util/native-tls"]
rustls-tls = ["exc-util/rustls-tls"]

[dependencies]
exc-aden = {path = "../exc-aden", default-features = false}
